<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Online resume." />
    <title>Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Prevent theme flash before Vue mounts.
      (() => {
        try {
          const pref = localStorage.getItem('theme') || 'system'
          const systemDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          const resolved = pref === 'system' ? (systemDark ? 'dark' : 'light') : pref
          document.documentElement.classList.toggle('dark', resolved === 'dark')
        } catch {
          // ignore
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
